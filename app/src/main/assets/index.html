<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="color-scheme" content="dark"><title>人生重开器</title><style>
:root{--bg:#070a10;--surface:rgba(22,28,36,.62);--surface2:rgba(29,36,47,.58);--surface3:rgba(48,59,73,.56);--text:#f3f7ff;--mut:#ccd6e6;--mut2:#8f9bad;--line:rgba(255,255,255,.16);--pri:#b9ddff;--onpri:#071827;--sec:#d8d1ff;--ok:#8bf0bd;--bad:#ffb4ab;--warn:#ffe0a8;--r:20px;--shadow:0 18px 42px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.18);--glass:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.06) 42%,rgba(255,255,255,.12));}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden}body{margin:0;background:var(--bg);color:var(--text);font-family:Roboto,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.45}button,input,textarea{font:inherit}button{touch-action:manipulation}#app{height:100%;display:flex;flex-direction:column;background:linear-gradient(180deg,#15191f 0,#101318 100%)}.top{padding:calc(5px + env(safe-area-inset-top)) 12px 5px;background:rgba(7,10,16,.74);border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%)}.titlebar{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:8px;min-width:0}.logo{width:30px;height:30px;border-radius:12px;background:var(--glass);color:#eaf5ff;display:grid;place-items:center;font-weight:900;font-size:16px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.22)}h1{font-size:16px;line-height:1.05;margin:0;font-weight:850;letter-spacing:.1px}.sub{font-size:10px;color:var(--mut2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chip{border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--mut);border-radius:999px;padding:5px 8px;font-size:11px;white-space:nowrap;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.chip.ok{color:#b9f6ca;border-color:#315d42;background:#17251c}.tabs{position:fixed;left:12px;right:12px;bottom:calc(8px + env(safe-area-inset-bottom));height:56px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:6px;border:1px solid rgba(255,255,255,.20);border-radius:26px;background:linear-gradient(135deg,rgba(255,255,255,.22),rgba(255,255,255,.07) 46%,rgba(255,255,255,.16));box-shadow:0 18px 46px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.22);backdrop-filter:blur(26px) saturate(170%);-webkit-backdrop-filter:blur(26px) saturate(170%);z-index:20;transition:transform .28s cubic-bezier(.2,.8,.2,1),opacity .25s}.tabs.hidden{transform:translateY(92px);opacity:.08;pointer-events:none}.tab{border:0;border-radius:20px;background:transparent;color:rgba(235,244,255,.74);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;font-size:10px}.tab b{font-size:17px;line-height:1}.tab.on{background:rgba(255,255,255,.22);color:#fff;font-weight:850;box-shadow:inset 0 1px 0 rgba(255,255,255,.22)}.content{flex:1;min-height:0;overflow:auto;padding:8px 10px 86px;scroll-behavior:auto;-webkit-overflow-scrolling:touch;background:radial-gradient(circle at 20% 0,rgba(91,154,255,.18),transparent 32%),radial-gradient(circle at 90% 18%,rgba(204,174,255,.14),transparent 28%)}.page{display:none;max-width:860px;margin:0 auto}.page.on{display:block}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px;margin:0 0 9px;box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(145%);-webkit-backdrop-filter:blur(18px) saturate(145%)}.card.tonal{background:#1d2630;border-color:#334150}.hero{padding:10px 12px;background:var(--glass);border-color:rgba(255,255,255,.18)}.hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}h2{font-size:18px;line-height:1.1;margin:0 0 5px}h3{font-size:15px;margin:0 0 7px}.small{font-size:13px;color:var(--mut2)}.btns{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid rgba(255,255,255,.13);border-radius:17px;padding:10px 11px;min-height:42px;font-weight:850;background:rgba(255,255,255,.11);color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}.btn.primary{background:linear-gradient(135deg,#d9efff,#91c9ff);color:var(--onpri)}.btn.tonal{background:rgba(255,255,255,.10);color:#dcecff}.btn.danger{background:#442926;color:var(--bad)}.btn:disabled{opacity:.55}.fabrow{display:grid;grid-template-columns:1.05fr 1fr 1fr;gap:7px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:7px}.stat{background:rgba(255,255,255,.08);border-radius:15px;padding:7px 5px;text-align:center;border:1px solid rgba(255,255,255,.12)}.stat span{display:block;font-size:12px;color:var(--mut2)}.stat b{display:block;font-size:22px;margin-top:2px;color:#f0f6ff}.story{white-space:pre-wrap;color:#eef1f7;font-size:15px}.options{display:grid;gap:10px}.option{border:1px solid #35414c;background:#20262d;border-radius:18px;padding:13px 14px;color:#eef1f7}.option:active,.btn:active{transform:scale(.985)}label{display:block;font-size:13px;color:var(--mut);margin:12px 0 6px}input,textarea{width:100%;border:1px solid #3e4751;border-radius:16px;background:#11161b;color:var(--text);padding:13px 14px;outline:none}input:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 2px rgba(159,202,255,.18)}textarea{min-height:104px;resize:vertical}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.saveitem{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#20252b;border:1px solid #303840;border-radius:18px;padding:12px;margin:0 0 10px}.saveitem .btn{padding:9px 11px;min-height:38px;border-radius:14px}pre{white-space:pre-wrap;word-break:break-word;margin:0;color:#dce8f8;font-size:12px}.toast{position:fixed;left:18px;right:18px;bottom:86px;background:#e4e1e9;color:#1c1b20;border-radius:14px;padding:13px 16px;display:none;z-index:9;box-shadow:var(--shadow);font-weight:700}.progress{height:4px;background:#26323d;overflow:hidden;border-radius:999px;display:none;margin-top:10px}.progress i{display:block;width:42%;height:100%;background:var(--pri);border-radius:999px;animation:ind 1s infinite ease-in-out}@keyframes ind{0%{transform:translateX(-100%)}100%{transform:translateX(260%)}}@media(max-width:520px){.fabrow,.grid2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}h1{font-size:19px}.content{padding-left:12px;padding-right:12px}}
.choicebtn{width:100%;border:1px solid rgba(255,255,255,.17);background:rgba(255,255,255,.10);color:var(--text);border-radius:18px;padding:11px 12px;text-align:left;display:flex;gap:10px;align-items:flex-start;margin:7px 0;box-shadow:0 10px 26px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}.choicebtn:active{transform:scale(.985);background:rgba(255,255,255,.18)}.choiceidx{min-width:30px;height:30px;border-radius:12px;background:rgba(220,240,255,.88);color:var(--onpri);display:grid;place-items:center;font-weight:900}.choicetxt{flex:1;line-height:1.45}.quickcheat{display:flex;gap:8px;align-items:stretch}.quickcheat input{flex:1;min-width:0}.choicebar{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:8px 0}.numchoice{height:42px;border:1px solid rgba(255,255,255,.18);border-radius:16px;background:rgba(220,240,255,.88);color:#071827;font-weight:950;font-size:18px;box-shadow:0 8px 18px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.25)}.numchoice:active{transform:scale(.96)}.choiceTextList{display:grid;gap:6px;margin-top:4px}.choiceLine{display:flex;gap:8px;align-items:flex-start;padding:8px 9px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);font-size:13px;line-height:1.35}.choiceLine b{color:#d9eeff;min-width:18px}.cheatBox{margin:9px 0 0;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(255,255,255,.07);padding:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}.cheatBox summary{cursor:pointer;list-style:none;padding:11px 13px;font-weight:850;color:#eaf5ff}.cheatBox summary::-webkit-details-marker{display:none}.cheatBox summary:after{content:"收起";float:right;color:var(--mut2);font-weight:700}.cheatBox:not([open]) summary:after{content:"展开"}.cheatInline{display:flex;gap:7px;padding:0 9px 9px}.cheatInline input{min-height:40px;padding:10px 12px;border-radius:15px;background:rgba(6,10,16,.38)}.cheatInline button{border:0;border-radius:15px;padding:0 13px;font-weight:900;background:rgba(216,238,255,.86);color:#071827}.cheatResult{padding:0 12px 12px;color:#ffe0a8}.flash{animation:flashStat .9s ease}@keyframes flashStat{0%,100%{filter:none}35%{filter:brightness(1.45);transform:scale(1.02)}}.hintline{color:var(--warn);font-size:11px;margin-top:4px}</style></head><body><div id="app"><header class="top"><div class="titlebar"><div class="brand"><div class="logo">重</div><div style="min-width:0"><h1>人生重开器</h1><div class="sub" id="status">离线可玩 · 可选 AI · 本地存档</div></div></div><button class="chip" onclick="saveNow()">存</button></div><div class="progress" id="progress"><i></i></div></header><main class="content">
<section id="game" class="page"><div class="card hero"><div class="hrow"><div><h2 id="personTitle">还没开始</h2><div id="personMeta" class="small">点“重开人生”，先本地生成，不卡界面。</div></div><span id="apiBadge" class="chip">未配置 API</span></div><div class="stats" id="stats"></div></div><div class="card"><div class="fabrow"><button class="btn primary" onclick="newLife()">重开人生</button><button class="btn tonal" onclick="generateBackground()">生成背景</button><button class="btn tonal" onclick="nextEvent()">下一事件</button></div></div><div class="card"><h3>当前故事</h3><div class="story" id="story">点“重开人生”。</div></div><div class="card"><h3>选择</h3><div class="hintline">点下面 1/2/3/4/5 选项继续人生；如果 AI 把选项写在正文里，系统会自动抽出来。</div><div class="options" id="options"></div></div><details class="cheatBox"><summary>开挂 / 修改当前人生</summary><div class="cheatInline"><input id="quickCheatText" placeholder="例：智力+3 / 健康=10 / 马上给我100万 / 回含山"><button onclick="quickCheat()">开挂</button></div><div class="small cheatResult" id="cheatResult" style="display:none"></div></details></section>

<section id="saves" class="page"><div class="card"><h2>存档管理</h2><label>存档名</label><input id="saveName" value="小郭的人生存档"><div class="btns" style="margin-top:12px"><button class="btn primary" onclick="saveNamed()">保存</button><button class="btn tonal" onclick="renderSaves()">刷新</button><button class="btn tonal" onclick="exportSave()">导出</button><button class="btn tonal" onclick="importSave()">导入</button></div></div><div class="card"><h3>存档列表</h3><div id="saveList"></div></div><div class="card"><h3>导入 / 导出 JSON</h3><textarea id="saveBox" placeholder="导出的 JSON 会在这里；也可以粘贴 JSON 后导入"></textarea></div></section>
<section id="settings" class="page"><div class="card"><h2>AI 设置</h2><label>Base URL</label><input id="apiBase" placeholder="https://api.example.com/v1" value="https://token-plan-sgp.xiaomimimo.com/v1"><label>API Key</label><input id="apiKey" placeholder="粘贴你的 sk-... API Key" type="password" value="tp-shzrf6p1kcvnyih0fn1hutii32sh76jdcizea0erm5gu3jfe"><div class="grid2"><div><label>模型</label><input id="model" placeholder="gpt-5.5" value="mimo-v2.5-pro"></div><div><label>Max Tokens</label><input id="maxTokens" type="number" value="4096"></div></div><div class="grid2"><div><label>Temperature</label><input id="temperature" type="number" step="0.1" value="0.8"></div><div><label>请求超时</label><input value="原生层 60 秒 / 页面 45 秒" disabled></div></div><label>游戏风格提示词</label><textarea id="stylePrompt">中文沉浸式人生模拟器，现实细节丰富，像小说但不要啰嗦。事件必须给 5 个选项，其中至少 1 个特殊选项。</textarea><div class="btns" style="margin-top:12px"><button class="btn primary" onclick="saveSettings()">保存设置</button><button class="btn tonal" id="testBtn" onclick="testApi()">测试 API</button><button class="btn tonal" onclick="fetchModels()">获取模型</button><button class="btn danger" onclick="clearSettings()">清空密钥</button></div><p class="small" id="testResult">已内置 ai2.hhhl.cc Base URL 和 gpt-5.5 模型；API Key 需你粘贴保存。测试会真实请求 /chat/completions，45 秒内失败会显示具体原因。</p></div></section>
<section id="log" class="page"><div class="card"><h2>调试日志</h2><pre id="logBox"></pre><div class="btns" style="margin-top:12px"><button class="btn tonal" onclick="logs=[];renderLog()">清空日志</button></div></div></section>
</main><nav class="tabs"><button id="tab-game" class="tab" onclick="tab('game')"><b>骰</b>游戏</button><button id="tab-saves" class="tab" onclick="tab('saves')"><b>存</b>存档</button><button id="tab-settings" class="tab" onclick="tab('settings')"><b>钥</b>设置</button><button id="tab-log" class="tab" onclick="tab('log')"><b>志</b>日志</button></nav></div><div id="toast" class="toast"></div><script>
const $=id=>document.getElementById(id);let logs=[],state=null,busy=false;let settings={apiBase:'https://token-plan-sgp.xiaomimimo.com/v1',apiKey:'tp-shzrf6p1kcvnyih0fn1hutii32sh76jdcizea0erm5gu3jfe',model:'mimo-v2.5-pro',maxTokens:4096,temperature:0.8,stylePrompt:'中文沉浸式人生模拟器，现实细节丰富，像小说但不要啰嗦。事件必须给 5 个选项，其中至少 1 个特殊选项。'};
window.NativeAPI={seq:0,pending:{},callChat(base,key,model,payload,timeoutMs=180000){return new Promise((resolve,reject)=>{try{if(!base)return reject(new Error('未配置 Base URL'));if(!key)return reject(new Error('未配置 API Key：请在设置里粘贴 sk-... 后保存'));if(key.includes('...'))return reject(new Error('API Key 还是省略号/掩码，不是真实完整密钥'));const b=base.replace(/\/$/,'');const id='r'+(++this.seq);const timer=setTimeout(()=>{const p=this.pending[id];if(p){delete this.pending[id];reject(new Error('请求超过 '+Math.round(timeoutMs/1000)+' 秒；请检查网络/Base URL/模型'))}},timeoutMs);this.pending[id]={resolve:(x)=>{clearTimeout(timer);resolve(x)},reject:(e)=>{clearTimeout(timer);reject(e)},t:Date.now(),base:b,model};if(window.LifeNative){LifeNative.apiChat(id,b,key,model,JSON.stringify(payload));return}fetch(b+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify(payload)}).then(async r=>{let t=await r.text();r.ok?this._resolve(id,true,t):this._resolve(id,false,'HTTP '+r.status+': '+t.slice(0,800))}).catch(e=>this._resolve(id,false,e.message||String(e)))}catch(e){reject(e)}})},_resolve(id,ok,text){const p=this.pending[id];if(!p)return;delete this.pending[id];ok?p.resolve(text):p.reject(new Error(text||'请求失败'))}};const NativeAPI=window.NativeAPI;
function setBusy(v){busy=v;$('progress').style.display=v?'block':'none';document.querySelectorAll('button').forEach(b=>{if(!b.classList.contains('tab'))b.disabled=!!v});}
function storeGet(k){try{return window.LifeNative?LifeNative.getItem(k):localStorage.getItem(k)||''}catch(e){return localStorage.getItem(k)||''}}function storeSet(k,v){try{window.LifeNative?LifeNative.setItem(k,v):localStorage.setItem(k,v)}catch(e){localStorage.setItem(k,v)}}function storeRemove(k){try{window.LifeNative?LifeNative.removeItem(k):localStorage.removeItem(k)}catch(e){localStorage.removeItem(k)}}
function log(x){logs.unshift(new Date().toLocaleTimeString()+' '+x);logs=logs.slice(0,100);renderLog()}function renderLog(){$('logBox').textContent=logs.join('\n')}function toast(x){let t=$('toast');t.textContent=x;t.style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>t.style.display='none',2600)}
function loadSettings(){
let stored=storeGet('settings');let ver=storeGet('settingsVersion');
if(stored && ver!=='18'){try{let old=JSON.parse(stored);if(!old.apiBase||old.apiBase.includes('toktp')||!old.apiKey||old.apiKey.length<10||!old.model||!old.model.includes('mimo')){storeRemove('settings');storeRemove('settingsVersion');stored=null;log('settings: old version reset');}}catch(e){storeRemove('settings');stored=null;}}
let s=stored;if(s)try{settings={...settings,...JSON.parse(s)}}catch(e){}if(settings.model && !settings.model.toLowerCase().includes('mimo')){settings.model='mimo-v2.5-pro';log('model auto-corrected to mimo');}
if(!settings.apiBase||settings.apiBase.includes('toktp')){settings.apiBase='https://token-plan-sgp.xiaomimimo.com/v1';log('apiBase auto-corrected');}
if(!settings.apiKey||settings.apiKey.length<10){settings.apiKey='tp-shzrf6p1kcvnyih0fn1hutii32sh76jdcizea0erm5gu3jfe';log('apiKey auto-filled');}
storeSet('settings',JSON.stringify(settings));storeSet('settingsVersion','20');
['apiBase','apiKey','model','maxTokens','temperature','stylePrompt'].forEach(k=>{let el=$(k);if(el)el.value=settings[k]??''}); }function saveSettings(){['apiBase','apiKey','model','maxTokens','temperature','stylePrompt'].forEach(k=>settings[k]=$(k).value.trim());settings.maxTokens=+settings.maxTokens||1800;settings.temperature=+settings.temperature||0.8;storeSet('settings',JSON.stringify(settings));render();toast('设置已保存');log('settings saved')}function clearSettings(){settings.apiKey='';$('apiKey').value='';saveSettings()}function currentSettings(){saveSettings();return settings}
function tab(id){document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id===id));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));$('tab-'+id).classList.add('on');if(id==='saves')renderSaves();if(id==='log')renderLog()}
const cities=['含山','芜湖','南昌','合肥','南京','上海','仙踪','姚庙','马鞍山'];const mbti=['INTP','INFP','ENTP','INFJ','ISTP','ENFP','INTJ','ISFP'];function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}function pick(a){return a[Math.floor(Math.random()*a.length)]}
function newLife(){state={id:'life-'+Date.now(),createdAt:new Date().toISOString(),age:rnd(5,12),gender:Math.random()>.5?'男':'女',city:pick(cities),mbti:pick(mbti),attrs:{魅力:rnd(2,7),智力:rnd(2,8),健康:rnd(3,8),富裕:rnd(1,7),幸福度:rnd(2,8)},background:'',event:null,history:[],cheats:[]};saveNow(false);render();toast('已重开')}function saveNow(show=true){if(state){storeSet('autosave',JSON.stringify(state));if(show)toast('已快存')}}function loadAuto(){let s=storeGet('autosave');if(s)try{state=JSON.parse(s)}catch(e){}}
function personText(){return state?`${state.gender}，${state.city}，${state.age}岁，${state.mbti}，属性：${JSON.stringify(state.attrs)}`:''}function render(){const hasKey=!!(settings.apiBase&&settings.apiKey);$('status').textContent=hasKey?'AI 已配置 · 离线/联网双模式':'离线可玩 · 未配置 AI';$('apiBadge').textContent=hasKey?'API 已配置':'未配置 API';$('apiBadge').className='chip'+(hasKey?' ok':'');$('personTitle').textContent=state?`${state.city} · ${state.age}岁 · ${state.mbti}`:'还没开始';$('personMeta').textContent=state?`${state.gender} / ${state.id}`:'点“重开人生”，先本地生成，不卡界面。';$('stats').innerHTML=state?Object.entries(state.attrs).map(([k,v])=>`<div class="stat"><span>${k}</span><b>${v}</b></div>`).join(''):'';$('story').textContent=state?(state.event?.text||state.background||'点“生成背景”开始。'):'点“重开人生”。';$('options').innerHTML=state&&state.event&&state.event.options?.length?`<div class="choicebar">${state.event.options.map((o,i)=>`<button type="button" class="numchoice" onclick="choose(${i})">${i+1}</button>`).join('')}</div><div class="choiceTextList">${state.event.options.map((o,i)=>`<div class="choiceLine" onclick="choose(${i})"><b>${i+1}.</b><span>${esc(o)}</span></div>`).join('')}</div>`:'<div class="small">暂无选项：点“下一事件”，或等正文里出现 1-5 时自动提取。</div>'}function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function localBackground(){return `你出生在${state.city}。这不是一个抽象地名，而是一串具体声音：清晨楼下的车轮、水汽、早点摊、家里人催你写作业的语气。你从小就有点${state.mbti}式的观察癖，不太满足于别人告诉你的答案。\n\n你的起点并不夸张：健康${state.attrs.健康}，智力${state.attrs.智力}，富裕${state.attrs.富裕}，幸福度${state.attrs.幸福度}。这组数字不是命运，只是开局手牌。真正改变人生的，是后面每一次选择。`}
async function askLLM(prompt){let s=currentSettings();
if(!s.model||!s.model.toLowerCase().includes('mimo')){
  log('model fix: '+s.model+' -> mimo-v2.5-pro'); s.model='mimo-v2.5-pro';
  try{$('model').value='mimo-v2.5-pro';saveSettings()}catch(e){}
}
let payload={model:s.model,messages:[{role:'system',content:s.stylePrompt},{role:'user',content:prompt}],temperature:Number(s.temperature)||0.8,max_tokens:Number(s.maxTokens)||4096,stream:false};let txt=await NativeAPI.callChat(s.apiBase,s.apiKey,s.model,payload);let data;try{data=JSON.parse(txt)}catch(e){throw new Error('返回不是 JSON：'+txt.slice(0,220))}let c=data.choices&&data.choices[0];let msg=c&&((c.message?.content&&c.message.content.trim())||c.message?.reasoning_content||c.text||'');if(!msg)throw new Error('无 choices/message.content：'+txt.slice(0,220));return String(msg).trim()}
async function generateBackground(){if(!state)newLife();setBusy(true);$('story').textContent='生成背景中……';try{state.background=await askLLM('为这个玩家生成人生开局背景，300-600字，第二人称。玩家：'+personText());state.event=null;log('background by API')}catch(e){state.background=localBackground();state.event=null;log('background fallback: '+e.message);toast('AI 不通: '+(e.message||'').slice(0,60))}finally{setBusy(false);saveNow(false);render()}}
function localEvent(){const pool=[['旧收音机里的远方','你在旧货摊看到一台还能响的收音机，老板说五块钱拿走。它像一个藏着远方的小盒子。',['买下它并拆开研究','忍住好奇回家写作业','问老板它为什么能收到远处声音','帮老板整理零件换一次拆机机会','把这件事写进日记']],['一次突然的机会','学校/社区里来了一个你从没见过的人，他提供了一个小项目名额，但要你当众表达自己的想法。',['马上报名','先观察别人怎么做','私下找他聊清楚规则','拉一个朋友一起参加','拒绝，继续做自己的事']],['家庭饭桌上的岔路','晚饭时，大人们讨论现实、钱和未来。你忽然发现自己的兴趣在他们眼里可能“不务正业”。',['正面说出自己的想法','沉默但继续偷偷做','用一次成绩证明自己','和家里人谈条件','直接开挂：把目标写下来贴墙上']]];let p=pick(pool);return {title:p[0],text:`${p[0]}\n\n${p[1]}\n\n你现在${state.age}岁，地点在${state.city}。你的属性会影响这次选择的后果。`,options:p[2]}}

function normalizeOptions(ev){if(!ev)ev={};let text=String(ev.text||ev.content||'').replace(/\r/g,'').trim();let opts=Array.isArray(ev.options)?ev.options.filter(Boolean).map(x=>String(x).trim()).filter(Boolean):[];
function cleanOpt(x){return String(x||'').replace(/^【?特殊】?\s*/,'【特殊】').replace(/[。；;\s]+$/,'').trim()}
if(opts.length<2){let src=text.replace(/([；;])\s*(?=(?:[1-5一二三四五]|[①②③④⑤])[\.、\)）:：])/g,'\n');let lines=src.split(/\n+/).map(x=>x.trim()).filter(Boolean);let found=[];let clean=[];for(let line of lines){let m=line.match(/^(?:你要怎么做[？?]?\s*)?(?:选项\s*)?([1-5一二三四五])[\.、\)）:\：\s]+(.{2,140})$/);if(m){found.push(cleanOpt(m[2]));continue}m=line.match(/^(?:第[一二三四五]项|[①②③④⑤])\s*[\.、\)）:\：\s]*(.{2,140})$/);if(m){found.push(cleanOpt(m[1]));continue}clean.push(line)}if(found.length>=2){opts=found;text=clean.join('\n\n').trim()||text}}
if(opts.length<2){let simple=text.replace(/([；;])\s*(?=[1-5][\.、\)）])/g,'\n');let found=[];for(let part of simple.split(/\n+/)){let m=part.trim().match(/(?:^|.*?[。！？?：:\s])([1-5])[\.、\)）]\s*(.{2,120})$/);if(m)found.push(cleanOpt(m[2]))}if(found.length>=2){opts=found.slice(0,5);let cut=text.search(/[。！？?：:\s][1-5][\.、\)）]/);if(cut>0)text=text.slice(0,cut+1).trim()}}
if(opts.length<5){let defaults=['谨慎观察局势','主动争取机会','找人帮忙打听','投入时间学习','用当前资源开挂解决'];opts=[...opts,...defaults].slice(0,5)}
return {text,options:opts.slice(0,5)}
}
async function nextEvent(){if(!state)newLife();if(!state.background)state.background=localBackground();setBusy(true);$('story').textContent='生成事件中……';try{let out=await askLLM('根据玩家状态生成一个人生事件。优先只用JSON返回：{"text":"事件正文，不要把选项写进正文","options":["选项1","选项2","选项3","选项4","选项5"]}。玩家状态：'+JSON.stringify(state));let json=(out.replace(/```[a-z]*/g,'').trim()).match(/\{[\s\S]*\}/)?.[0];state.event=json?normalizeOptions(JSON.parse(json)):normalizeOptions({text:out});if(!Array.isArray(state.event.options)||state.event.options.length<2)throw new Error('options invalid');log('event by API')}catch(e){state.event=normalizeOptions(localEvent());log('event fallback: '+e.message);toast('事件失败: '+(e.message||'').slice(0,60))}finally{setBusy(false);saveNow(false);render()}}
async function choose(i){if(!state||!state.event)return;let opt=state.event.options[i],old=JSON.parse(JSON.stringify(state.attrs)),result='';setBusy(true);try{result=await askLLM('玩家选择了：'+opt+'。请给出150-300字后果，并返回最后一行 JSON：{"attrs":{"魅力":数字,"智力":数字,"健康":数字,"富裕":数字,"幸福度":数字},"ageAdd":数字}。当前：'+JSON.stringify(state));let json=(result.replace(/```[a-z]*/g,'').trim()).match(/\{[\s\S]*\}/)?.[0];if(json){let d=JSON.parse(json);if(d.attrs)state.attrs=clampAttrs(d.attrs);state.age+=Number(d.ageAdd)||rnd(1,4)}log('choice by API')}catch(e){let k=pick(Object.keys(state.attrs));state.attrs[k]=Math.max(0,Math.min(10,state.attrs[k]+pick([-1,1,1,2])));state.age+=rnd(1,3);result=`你选择了“${opt}”。这次选择没有立刻改写世界，但它改变了你看待自己的方式。${k}发生变化：${old[k]} → ${state.attrs[k]}。`;log('choice fallback: '+e.message)}finally{setBusy(false)}state.history.push({age:state.age,option:opt,result,attrs:state.attrs});let cleanResult=result.replace(/\{[\s\S]*\}\s*$/,'').trim();let follow=normalizeOptions({text:cleanResult});state.event=(follow.options&&follow.options.length>=2&&/([1-5][\.、\)）]|[①②③④⑤]|接下来|你要怎么做|你会)/.test(cleanResult))?follow:{text:cleanResult,options:[]};saveNow(false);render()}
function clampAttrs(a){let out={...state.attrs};for(let k of Object.keys(out)){let v=Number(a[k]??out[k]);out[k]=Math.max(0,Math.min(10,Math.round(v)))}return out}
async function applyCheat(useAI){if(!state)newLife();let cmd=$('cheatText').value.trim();if(!cmd)return toast('先输入外挂指令');let before=JSON.stringify(state.attrs),note='';if(useAI){setBusy(true);try{let out=await askLLM('你是人生模拟器外挂解释器。根据指令修改状态，返回JSON：{"patch":{"age":数字可选,"city":"可选","attrs":{"智力":数字等可选},"backgroundAppend":"追加故事"},"explain":"解释"}。指令：'+cmd+'\n当前状态：'+JSON.stringify(state));let d=JSON.parse((out.replace(/```[a-z]*/g,'').trim()).match(/\{[\s\S]*\}/)?.[0]);applyPatch(d.patch||{});note=d.explain||out;log('cheat by API')}catch(e){note='模型开挂失败，改用本地规则：'+e.message+'\n'+localCheat(cmd);log('cheat fallback: '+e.message)}finally{setBusy(false)}}else note=localCheat(cmd);state.cheats.push({time:new Date().toISOString(),cmd,before,after:JSON.stringify(state.attrs),note});saveNow(false);render();if($('cheatResult')){$('cheatResult').style.display='block';$('cheatResult').textContent=`外挂：${cmd}｜${note}｜属性：${before} → ${JSON.stringify(state.attrs)}`};document.querySelector('.hero')?.classList.add('flash');setTimeout(()=>document.querySelector('.hero')?.classList.remove('flash'),900);toast('外挂已生效：'+note)}function quickCheat(){let v=$('quickCheatText').value.trim();if(!v)return toast('先输入快速外挂');let hidden=$('cheatText');if(!hidden){hidden=document.createElement('textarea');hidden.id='cheatText';hidden.style.display='none';document.body.appendChild(hidden); if(document.els)document.els.cheatText=hidden}hidden.value=v;applyCheat(false);$('quickCheatText').value=''}
function applyPatch(p){if(p.age!=null)state.age=Number(p.age)||state.age;if(p.city)state.city=String(p.city);if(p.attrs)state.attrs=clampAttrs({...state.attrs,...p.attrs});if(p.backgroundAppend)state.background+='\n\n[外挂] '+p.backgroundAppend;if(p.eventText)state.event={text:p.eventText,options:[]}}
function localCheat(cmd){let changed=[];for(let k of Object.keys(state.attrs)){let m=cmd.match(new RegExp(k+'\\s*([+=-])\\s*(\\d+)'));if(m){let n=+m[2];if(m[1]==='=')state.attrs[k]=n;if(m[1]==='+')state.attrs[k]+=n;if(m[1]==='-')state.attrs[k]-=n;state.attrs[k]=Math.max(0,Math.min(10,state.attrs[k]));changed.push(k+'='+state.attrs[k])}}let city=cmd.match(/(?:出生在|去|回)(含山|芜湖|南昌|合肥|南京|上海|仙踪|姚庙|马鞍山)/);if(city){state.city=city[1];changed.push('城市')}if(/(一百万|100\s*万|百万|一百\s*万|有钱|暴富|财富|富裕|给我.*万|马上.*万|钱)/.test(cmd)){state.attrs.富裕=10;changed.push('富裕=10')}if(/不死|健康|满血/.test(cmd)){state.attrs.健康=10;changed.push('健康')}if(/聪明|智力|天才/.test(cmd)){state.attrs.智力=10;changed.push('智力')}state.background+='\n\n[外挂介入] '+cmd;return changed.length?'本地外挂已修改：'+changed.join('、'):'已把外挂指令写入人生背景，后续事件会参考它。'}
function saveNamed(){if(!state)return toast('没有人生可存');let name=$('saveName').value||('存档 '+new Date().toLocaleString());let saves=JSON.parse(storeGet('saves')||'[]');saves.unshift({name,time:new Date().toISOString(),state});storeSet('saves',JSON.stringify(saves.slice(0,50)));renderSaves();toast('已保存')}function renderSaves(){let saves=JSON.parse(storeGet('saves')||'[]');$('saveList').innerHTML=saves.length?saves.map((s,i)=>`<div class="saveitem"><div><b>${esc(s.name)}</b><div class="small">${new Date(s.time).toLocaleString()} · ${esc(s.state.city)} ${s.state.age}岁</div></div><div><button class="btn tonal" onclick="loadSave(${i})">读档</button> <button class="btn danger" onclick="delSave(${i})">删</button></div></div>`).join(''):'<div class="small">暂无存档</div>'}function loadSave(i){let saves=JSON.parse(storeGet('saves')||'[]');state=saves[i].state;saveNow(false);render();tab('game');toast('已读档')}function delSave(i){if(!confirm('删除这个存档？'))return;let saves=JSON.parse(storeGet('saves')||'[]');saves.splice(i,1);storeSet('saves',JSON.stringify(saves));renderSaves()}function exportSave(){$('saveBox').value=JSON.stringify({settings:{...settings,apiKey:''},state},null,2)}function importSave(){try{let d=JSON.parse($('saveBox').value);if(d.state)state=d.state;saveNow(false);render();toast('导入成功')}catch(e){toast('导入失败：'+e.message)}}

async function fetchModels(){
  let s=currentSettings();
  if(!s.apiBase||!s.apiKey)return toast('先填写 Base URL 和 API Key');
  setBusy(true);
  try{
    let base=s.apiBase.replace(/\/$/,'').replace(/\/chat\/completions$/,'');
    let resp=await fetch(base+'/models',{headers:{'Authorization':'Bearer '+s.apiKey}});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    let d=await resp.json();
    let models=(d.data||[]).map(m=>m.id).filter(Boolean);
    if(!models.length)throw new Error('模型列表为空');
    let el=$('model');
    let sel=document.createElement('select');
    sel.id='modelSelect';
    sel.innerHTML='<option value="">▼ 选择模型</option>'+models.map(m=>'<option value="'+m+'"'+(m===el.value?' selected':'')+'>'+m+'</option>').join('');
    sel.style.cssText='width:100%;padding:8px;border-radius:8px;margin:4px 0;background:#1a1a2e;color:#e0e0e0;border:1px solid #333';
    sel.onchange=function(){if(this.value){el.value=this.value;saveSettings();toast('已选: '+this.value)}};
    let old=$('modelSelect');if(old)old.remove();
    el.parentNode.insertBefore(sel,el.nextSibling);
    toast('获取到 '+models.length+' 个模型，请选择');
  }catch(e){toast('获取模型失败: '+(e.message||'').slice(0,60))}finally{setBusy(false)}
}
async function testApi(){let btn=$('testBtn'),old=btn.textContent;btn.textContent='测试中…';setBusy(true);try{let s=currentSettings();let started=Date.now();let payload={model:s.model||'mimo-v2.5-pro',messages:[{role:'user',content:'只回复：人生重开器 API 已连接'}],max_tokens:30,temperature:0,stream:false};log('API test start base='+s.apiBase+' model='+payload.model+' key=***'+String(s.apiKey).slice(-4));let txt=await NativeAPI.callChat(s.apiBase,s.apiKey,payload.model,payload,45000);let ms=Date.now()-started;let data;try{data=JSON.parse(txt)}catch(e){throw new Error('HTTP 200 但返回不是 JSON：'+txt.slice(0,300))}let c=data.choices&&data.choices[0];let out=c&&(c.message?.content||c.message?.reasoning_content||c.text);if(!out)throw new Error('HTTP 200 但没有 choices[0].message.content：'+txt.slice(0,500));let msg='API 测试成功：'+String(out).slice(0,180)+'；实际模型='+(data.model||payload.model)+'；耗时 '+ms+'ms';$('testResult').textContent=msg;toast('API 已联通');log(msg)}catch(e){let msg='API 测试失败：'+(e&&e.message?e.message:String(e));$('testResult').textContent=msg;toast('API 测试失败，原因已显示');log(msg)}finally{setBusy(false);btn.disabled=false;btn.textContent=old}}
